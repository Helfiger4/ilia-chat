<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ilia_chat</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, sans-serif; background: #f0f0f0; height: 100vh; display: flex; align-items: center; justify-content: center; }
.wrap { width: 100%; max-width: 480px; height: 100vh; max-height: 700px; background: #fff; border-radius: 20px; box-shadow: 0 8px 40px rgba(0,0,0,0.12); display: flex; flex-direction: column; overflow: hidden; }
.header { padding: 18px 20px; background: #1a1a1a; display: flex; align-items: center; gap: 10px; }
.logo { font-size: 18px; font-weight: 600; color: #fff; }
.online { font-size: 12px; color: #4ade80; margin-left: auto; }

.login { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 32px; gap: 16px; }
.login h2 { font-size: 22px; color: #1a1a1a; }
.login p { font-size: 14px; color: #888; text-align: center; }
.login input { width: 100%; padding: 14px 16px; border: 2px solid #e0e0e0; border-radius: 12px; font-size: 15px; outline: none; }
.login input:focus { border-color: #1a1a1a; }
.login button { width: 100%; padding: 14px; background: #1a1a1a; color: #fff; border: none; border-radius: 12px; font-size: 15px; font-weight: 600; cursor: pointer; }
.login button:hover { background: #333; }

.chat { display: none; flex: 1; flex-direction: column; overflow: hidden; }
.messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 8px; background: #f8f8f8; }
.msg { max-width: 75%; padding: 10px 14px; border-radius: 18px; font-size: 14px; line-height: 1.5; word-break: break-word; }
.msg.them { background: #fff; border: 1px solid #e0e0e0; align-self: flex-start; border-bottom-left-radius: 4px; }
.msg.me { background: #1a1a1a; color: #fff; align-self: flex-end; border-bottom-right-radius: 4px; }
.msg .sender { font-size: 11px; opacity: 0.5; margin-bottom: 3px; font-weight: 600; }
.msg .time { font-size: 10px; opacity: 0.4; margin-top: 4px; text-align: right; }
.empty { flex: 1; display: flex; align-items: center; justify-content: center; color: #bbb; font-size: 14px; }

.input-area { display: flex; gap: 8px; padding: 12px 14px; border-top: 1px solid #f0f0f0; background: #fff; }
.input-area textarea { flex: 1; border: 2px solid #e0e0e0; border-radius: 12px; padding: 10px 14px; font-size: 14px; resize: none; outline: none; line-height: 1.5; font-family: inherit; }
.input-area textarea:focus { border-color: #1a1a1a; }
.send { width: 42px; height: 42px; background: #1a1a1a; border: none; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.send:hover { background: #333; }
.send svg { fill: white; width: 18px; height: 18px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div class="logo">ilia_chat</div>
    <div class="online" id="onlineStatus">● онлайн</div>
  </div>

  <div class="login" id="loginScreen">
    <h2>Добро пожаловать 👋</h2>
    <p>Введите пароль если вы Илья,<br>или просто введите своё имя</p>
    <input type="text" id="nameInput" placeholder="Ваше имя" maxlength="30" />
    <input type="password" id="passInput" placeholder="Пароль (только для Ильи)" />
    <button onclick="joinChat()">Войти в чат</button>
    <p id="loginError" style="color:#e53e3e;font-size:12px;display:none;">Неверный пароль</p>
  </div>

  <div class="chat" id="chatScreen">
    <div class="messages" id="messages">
      <div class="empty" id="emptyMsg">Нет сообщений. Напишите первым! 👋</div>
    </div>
    <div class="input-area">
      <textarea id="msgInput" placeholder="Напишите сообщение..." rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button class="send" onclick="sendMsg()">
        <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg>
      </button>
    </div>
  </div>
</div>

<script>
let myName = '';
let lastCount = 0;

function joinChat() {
  const name = document.getElementById('nameInput').value.trim();
  const pass = document.getElementById('passInput').value.trim();
  if (!name) return;
  if (pass && pass !== 'ilia2024') {
    document.getElementById('loginError').style.display = 'block';
    return;
  }
  myName = (pass === 'ilia2024') ? 'Илья' : name;
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('chatScreen').style.display = 'flex';
  loadMessages();
  setInterval(loadMessages, 2000);
  document.getElementById('msgInput').focus();
}

async function loadMessages() {
  try {
    const res = await fetch('/messages');
    const data = await res.json();
    if (data.length !== lastCount) {
      lastCount = data.length;
      renderMessages(data);
    }
  } catch(e) {}
}

function renderMessages(msgs) {
  const container = document.getElementById('messages');
  const empty = document.getElementById('emptyMsg');
  if (!msgs.length) { empty.style.display = 'flex'; return; }
  empty.style.display = 'none';
  const atBottom = container.scrollHeight - container.scrollTop <= container.clientHeight + 50;
  container.innerHTML = '';
  msgs.forEach(m => {
    const div = document.createElement('div');
    div.className = 'msg ' + (m.sender === myName ? 'me' : 'them');
    div.innerHTML = (m.sender !== myName ? `<div class="sender">${m.sender}</div>` : '') +
      `<div>${esc(m.text)}</div><div class="time">${m.time}</div>`;
    container.appendChild(div);
  });
  if (atBottom) container.scrollTop = container.scrollHeight;
}

function esc(t) {
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

async function sendMsg() {
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  input.style.height = 'auto';
  await fetch('/send', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ sender: myName, text })
  });
  loadMessages();
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}
</script>
</body>
</html>
