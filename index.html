<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ilia_chat</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #f0f0f0; display: flex; align-items: center; justify-content: center; }
.wrap { width: 100%; max-width: 480px; height: 100vh; background: #fff; display: flex; flex-direction: column; }
@media (min-height: 700px) { .wrap { max-height: 700px; border-radius: 20px; box-shadow: 0 8px 40px rgba(0,0,0,0.12); } }
.header { padding: 14px 18px; background: #1a1a1a; display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
.logo { font-size: 17px; font-weight: 600; color: #fff; }
.online { font-size: 12px; color: #4ade80; margin-left: auto; }
.login { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 32px 24px; gap: 14px; }
.login h2 { font-size: 22px; color: #1a1a1a; }
.login p { font-size: 14px; color: #888; text-align: center; line-height: 1.5; }
.login input { width: 100%; padding: 14px 16px; border: 2px solid #e0e0e0; border-radius: 12px; font-size: 16px; outline: none; -webkit-appearance: none; }
.login input:focus { border-color: #1a1a1a; }
.login button { width: 100%; padding: 16px; background: #1a1a1a; color: #fff; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; -webkit-tap-highlight-color: transparent; }
.login button:active { background: #333; }
.err { color: #e53e3e; font-size: 13px; display: none; }
.chat { display: none; flex: 1; flex-direction: column; overflow: hidden; min-height: 0; }
.messages { flex: 1; overflow-y: auto; padding: 14px 14px 8px; display: flex; flex-direction: column; gap: 8px; background: #f8f8f8; -webkit-overflow-scrolling: touch; }
.msg { max-width: 78%; padding: 10px 14px; border-radius: 18px; font-size: 15px; line-height: 1.5; word-break: break-word; }
.msg.them { background: #fff; border: 1px solid #e8e8e8; align-self: flex-start; border-bottom-left-radius: 4px; color: #1a1a1a; }
.msg.me { background: #1a1a1a; color: #fff; align-self: flex-end; border-bottom-right-radius: 4px; }
.msg .sender { font-size: 11px; opacity: 0.5; margin-bottom: 3px; font-weight: 600; }
.msg .time { font-size: 10px; opacity: 0.4; margin-top: 4px; text-align: right; }
.empty { flex: 1; display: flex; align-items: center; justify-content: center; color: #ccc; font-size: 14px; text-align: center; padding: 20px; }
.input-area { display: flex; align-items: flex-end; gap: 8px; padding: 10px 12px; border-top: 1px solid #eee; background: #fff; flex-shrink: 0; padding-bottom: max(10px, env(safe-area-inset-bottom)); }
.input-area textarea { flex: 1; border: 2px solid #e0e0e0; border-radius: 20px; padding: 10px 14px; font-size: 15px; resize: none; outline: none; line-height: 1.5; font-family: inherit; max-height: 100px; -webkit-appearance: none; background: #f8f8f8; }
.input-area textarea:focus { border-color: #1a1a1a; background: #fff; }
.send { width: 44px; height: 44px; min-width: 44px; background: #1a1a1a; border: none; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; -webkit-tap-highlight-color: transparent; }
.send:active { background: #333; transform: scale(0.95); }
.send svg { fill: white; width: 20px; height: 20px; pointer-events: none; }
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div class="logo">ilia_chat</div>
    <div class="online">● онлайн</div>
  </div>
  <div class="login" id="loginScreen">
    <h2>Добро пожаловать 👋</h2>
    <p>Введите своё имя чтобы войти.<br>Если вы Илья — введите пароль.</p>
    <input type="text" id="nameInput" placeholder="Ваше имя" maxlength="30" autocomplete="name" />
    <input type="password" id="passInput" placeholder="Пароль (только для Ильи)" autocomplete="off" />
    <button onclick="joinChat()">Войти в чат</button>
    <div class="err" id="loginErr">Неверный пароль</div>
  </div>
  <div class="chat" id="chatScreen">
    <div class="messages" id="messages">
      <div class="empty" id="emptyMsg">Нет сообщений.<br>Напишите первым! 👋</div>
    </div>
    <div class="input-area">
      <textarea id="msgInput" placeholder="Сообщение..." rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button class="send" onclick="sendMsg()" type="button">
        <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg>
      </button>
    </div>
  </div>
</div>
<script>
const OWNER_PASS = 'ilia2024';
const SESSION_KEY = 'ilia_session_v2';
const SESSION_HOURS = 4;
let myName = '';
let lastCount = 0;

function restoreSession() {
  try {
    const saved = localStorage.getItem(SESSION_KEY);
    if (!saved) return false;
    const s = JSON.parse(saved);
    if (!s.name || !s.ts) return false;
    const age = (Date.now() - s.ts) / 3600000;
    if (age > SESSION_HOURS) { localStorage.removeItem(SESSION_KEY); return false; }
    myName = s.name;
    return true;
  } catch(e) { localStorage.removeItem(SESSION_KEY); return false; }
}

function saveSession(name) {
  localStorage.setItem(SESSION_KEY, JSON.stringify({ name, ts: Date.now() }));
}

function joinChat() {
  const name = document.getElementById('nameInput').value.trim();
  const pass = document.getElementById('passInput').value.trim();
  if (!name) { document.getElementById('nameInput').focus(); return; }
  if (pass && pass !== OWNER_PASS) {
    document.getElementById('loginErr').style.display = 'block';
    return;
  }
  myName = (pass === OWNER_PASS) ? 'Илья' : name;
  saveSession(myName);
  startChat();
}

function startChat() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('chatScreen').style.display = 'flex';
  loadMessages();
  setInterval(loadMessages, 2000);
  document.getElementById('msgInput').focus();
}

async function loadMessages() {
  try {
    const res = await fetch('/messages');
    if (!res.ok) return;
    const data = await res.json();
    if (data.length !== lastCount) {
      lastCount = data.length;
      renderMessages(data);
    }
  } catch(e) {}
}

function renderMessages(msgs) {
  const container = document.getElementById('messages');
  const empty = document.getElementById('emptyMsg');
  if (!msgs.length) { empty.style.display = 'flex'; return; }
  empty.style.display = 'none';
  const atBottom = container.scrollHeight - container.scrollTop <= container.clientHeight + 60;
  container.innerHTML = '';
  msgs.forEach(m => {
    const div = document.createElement('div');
    div.className = 'msg ' + (m.sender === myName ? 'me' : 'them');
    div.innerHTML = (m.sender !== myName ? `<div class="sender">${esc(m.sender)}</div>` : '') +
      `<div>${esc(m.text)}</div><div class="time">${m.time}</div>`;
    container.appendChild(div);
  });
  if (atBottom) container.scrollTop = container.scrollHeight;
}

function esc(t) {
  return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

async function sendMsg() {
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text || !myName) return;
  input.value = '';
  input.style.height = 'auto';
  try {
    await fetch('/send', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ sender: myName, text })
    });
    loadMessages();
  } catch(e) {}
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}

if (restoreSession() && myName) {
  startChat();
} else {
  localStorage.removeItem(SESSION_KEY);
  document.getElementById('loginScreen').style.display = 'flex';
}
</script>
</body>
</html>
